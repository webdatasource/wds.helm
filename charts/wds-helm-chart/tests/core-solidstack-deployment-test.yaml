suite: test core solidstack deployment
templates:
  - core-solidstack-deployment.yaml

tests:
  - it: should not render when mode != SingleService
    set:
      global.coreServices.mode: MultiService
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when mode = SingleService
    set:
      global.coreServices.mode: SingleService
      global.coreServices.databases.mongodb.connectionString: test
    asserts:
      - isKind:
          of: Deployment

  - it: should render with defaults
    set:
      global.coreServices.mode: SingleService
      global.coreServices.databases.mongodb.connectionString: test
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.replicas
          value: 1
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: ^docker\.io/webdatasource/solidstack:v\d+\.\d+\.\d+$
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: IfNotPresent
      - equal:
          path: spec.template.spec.containers[0].ports[0].name
          value: http
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8080
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /health
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: 8080
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /ready
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.port
          value: 8080
      - equal:
          path: spec.template.spec.containers[0].env[0].name
          value: JOB_TYPES
      - equal:
          path: spec.template.spec.containers[0].env[1].name
          value: EXTERNAL_IP_ADDRESS_CONFIGS
      - equal:
          path: spec.template.spec.containers[0].env[2].name
          value: MIN_LOG_LEVEL
      - equal:
          path: spec.template.spec.containers[0].env[2].value
          value: Information
      - equal:
          path: spec.template.spec.containers[0].env[3].name
          value: BASE_PATH
      - equal:
          path: spec.template.spec.containers[0].env[3].value
          value: /
      - equal:
          path: spec.template.spec.containers[0].env[4].name
          value: SEARCH_MODE
      - equal:
          path: spec.template.spec.containers[0].env[4].value
          value: FullText
      - equal:
          path: spec.template.spec.containers[0].env[5].name
          value: MONGODB_CONNECTION_STRING
      - equal:
          path: spec.template.spec.containers[0].env[5].value
          value: test
      - equal:
          path: spec.template.spec.containers[0].env[6].name
          value: MONGODB_DATABASE_NAME
      - equal:
          path: spec.template.spec.containers[0].env[6].value
          value: WebDataSource
      - notExists:
          path: spec.template.spec.nodeSelector
      - notExists:
          path: spec.template.spec.tolerations
      - notExists:
          path: spec.template.spec.affinity

  - it: should set SEARCH_MODE from values
    set:
      global.coreServices.mode: SingleService
      global.coreServices.databases.mongodb.connectionString: test
      global.coreServices.search.mode: FullTextAndVector
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[4].name
          value: SEARCH_MODE
      - equal:
          path: spec.template.spec.containers[0].env[4].value
          value: FullTextAndVector

  - it: should respect exceptionResponseDelayMs
    set:
      global.coreServices.mode: SingleService
      global.coreServices.databases.mongodb.connectionString: test
      global.coreServices.exceptionResponseDelayMs: 10
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[7].name
          value: GLOBAL_EXCEPTION_RESPONSE_DELAY_MS
      - equal:
          path: spec.template.spec.containers[0].env[7].value
          value: "10"

  - it: should include embedding env vars and retrieval flag (secret refs)
    set:
      global.coreServices.mode: SingleService
      global.coreServices.databases.mongodb.connectionString: test
      global.coreServices.search.enabled: true
      global.coreServices.search.embeddingService.urlSecretRef.name: embed-secret
      global.coreServices.search.embeddingService.urlSecretRef.key: url
      global.coreServices.search.embeddingService.apiKeySecretRef.name: embed-secret
      global.coreServices.search.embeddingService.apiKeySecretRef.key: apiKey
      global.coreServices.search.embeddingService.requestTemplate: "{ 'model': 'embeddinggemma', 'input': null }"
      global.coreServices.search.embeddingService.contentJsonPath: "$.input"
      global.coreServices.search.embeddingService.resultJsonPath: "$.embeddings"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[7].name
          value: FEATURE_FLAG_RETRIEVAL_ENABLED
      - equal:
          path: spec.template.spec.containers[0].env[7].value
          value: "true"
      - equal:
          path: spec.template.spec.containers[0].env[8].name
          value: EMBEDDING_SERVICE_URL
      - equal:
          path: spec.template.spec.containers[0].env[8].valueFrom.secretKeyRef.name
          value: embed-secret
      - equal:
          path: spec.template.spec.containers[0].env[8].valueFrom.secretKeyRef.key
          value: url
      - equal:
          path: spec.template.spec.containers[0].env[9].name
          value: EMBEDDING_SERVICE_API_KEY
      - equal:
          path: spec.template.spec.containers[0].env[9].valueFrom.secretKeyRef.name
          value: embed-secret
      - equal:
          path: spec.template.spec.containers[0].env[9].valueFrom.secretKeyRef.key
          value: apiKey
      - equal:
          path: spec.template.spec.containers[0].env[10].name
          value: EMBEDDING_SERVICE_REQUEST_TEMPLATE
      - equal:
          path: spec.template.spec.containers[0].env[10].value
          value: "{ 'model': 'embeddinggemma', 'input': null }"
      - equal:
          path: spec.template.spec.containers[0].env[11].name
          value: EMBEDDING_SERVICE_CONTENT_JSON_PATH
      - equal:
          path: spec.template.spec.containers[0].env[11].value
          value: "$.input"
      - equal:
          path: spec.template.spec.containers[0].env[12].name
          value: EMBEDDING_SERVICE_RESULT_JSON_PATH
      - equal:
          path: spec.template.spec.containers[0].env[12].value
          value: "$.embeddings"
      - equal:
          path: spec.template.spec.containers[0].env[13].name
          value: EMBEDDING_VECTORS_LENGTH
      - equal:
          path: spec.template.spec.containers[0].env[13].value
          value: "768"

  - it: should set the embedding vector length from values when retrieval is enabled
    set:
      global.coreServices.mode: SingleService
      global.coreServices.databases.mongodb.connectionString: test
      global.coreServices.search.enabled: true
      global.coreServices.search.embeddingService.dimentionsCount: 1024
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: EMBEDDING_VECTORS_LENGTH
            value: "1024"

  - it: should not include embedding env vars and retrieval flag when retrieval disabled
    set:
      global.coreServices.mode: SingleService
      global.coreServices.databases.mongodb.connectionString: test
      global.coreServices.search.enabled: false
      global.coreServices.search.embeddingService.url: https://embed.example
      global.coreServices.search.embeddingService.apiKey: secret-key
      global.coreServices.search.embeddingService.requestTemplate: "{ 'model': 'embeddinggemma', 'input': null }"
      global.coreServices.search.embeddingService.contentJsonPath: "$.input"
      global.coreServices.search.embeddingService.resultJsonPath: "$.embeddings"
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].env[7]
      - notExists:
          path: spec.template.spec.containers[0].env[8]
      - notExists:
          path: spec.template.spec.containers[0].env[9]
      - notExists:
          path: spec.template.spec.containers[0].env[10]
      - notExists:
          path: spec.template.spec.containers[0].env[11]
      - notExists:
          path: spec.template.spec.containers[0].env[12]

  - it: should support mongodb.connectionStringSecretRef
    set:
      global.coreServices.mode: SingleService
      global.coreServices.databases.mongodb.connectionString: ""
      global.coreServices.databases.mongodb.connectionStringSecretRef:
        name: mongo-secret
        key: conn
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[5].name
          value: MONGODB_CONNECTION_STRING
      - equal:
          path: spec.template.spec.containers[0].env[5].valueFrom.secretKeyRef.name
          value: mongo-secret
      - equal:
          path: spec.template.spec.containers[0].env[5].valueFrom.secretKeyRef.key
          value: conn

  - it: should prefer mongodb.connectionString over secretRef when both set
    set:
      global.coreServices.mode: SingleService
      global.coreServices.databases.mongodb.connectionString: literal-mongo
      global.coreServices.databases.mongodb.connectionStringSecretRef:
        name: mongo-secret
        key: conn
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[5].name
          value: MONGODB_CONNECTION_STRING
      - equal:
          path: spec.template.spec.containers[0].env[5].value
          value: literal-mongo
      - notExists:
          path: spec.template.spec.containers[0].env[5].valueFrom

  - it: should render image without registry when global.registry empty
    set:
      global.coreServices.mode: SingleService
      global.coreServices.databases.mongodb.connectionString: test
      global.registry: ""
    asserts:
    - matchRegex:
        path: spec.template.spec.containers[0].image
        pattern: ^webdatasource/solidstack:v\d+\.\d+\.\d+$

  - it: should render image with overrides (registry, name, tag, pullPolicy)
    set:
      global.coreServices.mode: SingleService
      global.coreServices.databases.mongodb.connectionString: test
      global.registry: custom.registry
      coreServices.solidstack.image.name: org/custom-solidstack
      coreServices.solidstack.image.tag: v9
      coreServices.solidstack.image.pullPolicy: Always
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: custom.registry/org/custom-solidstack:v9
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always

  - it: should not respect replicaCount override
    set:
      global.coreServices.mode: SingleService
      global.coreServices.databases.mongodb.connectionString: test
      coreServices.solidstack.replicaCount: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 1

  - it: should merge global and service deploymentExtraLabels
    set:
      global.coreServices.mode: SingleService
      global.coreServices.databases.mongodb.connectionString: test
      global.deploymentExtraLabels:
        globalLabel: g
        common: global
      coreServices.solidstack.deploymentExtraLabelsOverride:
        serviceLabel: s
        common: service
    asserts:
      - equal:
          path: metadata.labels.globalLabel
          value: g
      - equal:
          path: metadata.labels.serviceLabel
          value: s
      - equal:
          path: metadata.labels.common
          value: service

  - it: should apply global nodeSelector
    set:
      global.coreServices.mode: SingleService
      global.coreServices.databases.mongodb.connectionString: test
      global.nodeSelector:
        disktype: ssd
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector.disktype
          value: ssd

  - it: should allow nodeSelector override per service
    set:
      global.coreServices.mode: SingleService
      global.coreServices.databases.mongodb.connectionString: test
      global.nodeSelector:
        disktype: ssd
      coreServices.solidstack.nodeSelectorOverride:
        disktype: hdd
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector.disktype
          value: hdd

  - it: should apply global tolerations
    set:
      global.coreServices.mode: SingleService
      global.coreServices.databases.mongodb.connectionString: test
      global.tolerations:
        - key: dedicated
          operator: Equal
          value: solidstack
          effect: NoSchedule
    asserts:
      - equal:
          path: spec.template.spec.tolerations[0].key
          value: dedicated
      - equal:
          path: spec.template.spec.tolerations[0].operator
          value: Equal
      - equal:
          path: spec.template.spec.tolerations[0].value
          value: solidstack
      - equal:
          path: spec.template.spec.tolerations[0].effect
          value: NoSchedule

  - it: should allow tolerations override per service
    set:
      global.coreServices.mode: SingleService
      global.coreServices.databases.mongodb.connectionString: test
      global.tolerations:
        - key: dedicated
          operator: Equal
          value: solidstack
          effect: NoSchedule
      coreServices.solidstack.tolerationsOverride:
        - key: special
          operator: Exists
          effect: NoExecute
    asserts:
      - equal:
          path: spec.template.spec.tolerations[0].key
          value: special
      - equal:
          path: spec.template.spec.tolerations[0].operator
          value: Exists
      - equal:
          path: spec.template.spec.tolerations[0].effect
          value: NoExecute

  - it: should apply global affinity
    set:
      global.coreServices.mode: SingleService
      global.coreServices.databases.mongodb.connectionString: test
      global.affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                - key: disktype
                  operator: In
                  values:
                    - ssd
    asserts:
      - equal:
          path: spec.template.spec.affinity.nodeAffinity.requiredDuringSchedulingIgnoredDuringExecution.nodeSelectorTerms[0].matchExpressions[0].key
          value: disktype
      - equal:
          path: spec.template.spec.affinity.nodeAffinity.requiredDuringSchedulingIgnoredDuringExecution.nodeSelectorTerms[0].matchExpressions[0].values[0]
          value: ssd

  - it: should allow affinity override per service
    set:
      global.coreServices.mode: SingleService
      global.coreServices.databases.mongodb.connectionString: test
      global.affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                - key: disktype
                  operator: In
                  values:
                    - ssd
      coreServices.solidstack.affinityOverride:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - solidstack
                topologyKey: kubernetes.io/hostname
    asserts:
      - notExists:
          path: spec.template.spec.affinity.nodeAffinity
      - equal:
          path: spec.template.spec.affinity.podAntiAffinity.preferredDuringSchedulingIgnoredDuringExecution[0].weight
          value: 100

  - it: should respect ingress.basePath
    set:
      global.coreServices.mode: SingleService
      global.coreServices.databases.mongodb.connectionString: test
      global.ingress.basePath: /test/
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[3].value
          value: /test/

  - it: should prefer service resources over global resources
    set:
      global.coreServices.mode: SingleService
      global.coreServices.databases.mongodb.connectionString: test
      coreServices.solidstack.resourcesOverride:
        requests:
          cpu: 500m
          memory: 512Mi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 500m
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 512Mi
