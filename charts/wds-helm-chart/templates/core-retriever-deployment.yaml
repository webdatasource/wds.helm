{{- if and (eq .Values.global.coreServices.mode "MultiService") .Values.global.coreServices.search.enabled }}
  {{- $name := "retriever" }}
  {{- $env := list
    (dict "name" "IDEALER_ORIGIN" "value" "http://idealer")
    (dict "name" "MIN_LOG_LEVEL" "value" .Values.global.minLogLevel)
  }}

  {{- if .Values.global.coreServices.license.key }}
    {{- $env = append $env (dict "name" "LICENSE_KEY" "value" .Values.global.coreServices.license.key) }}
  {{- else if .Values.global.coreServices.license.keySecretRef }}
    {{- $env = append $env (dict "name" "LICENSE_KEY" "valueFrom" (dict "secretKeyRef" (dict "name" .Values.global.coreServices.license.keySecretRef.name "key" .Values.global.coreServices.license.keySecretRef.key))) }}
  {{- else }}
    {{- fail "Either coreServices.license.key or coreServices.license.keySecretRef must be set when coreServices.mode is MultiService" }}
  {{- end }}

  {{- if .Values.global.coreServices.databases.mongodb.connectionString }}
    {{- $env = append $env (dict "name" "MONGODB_CONNECTION_STRING" "value" .Values.global.coreServices.databases.mongodb.connectionString ) }}
  {{- else if .Values.global.coreServices.databases.mongodb.connectionStringSecretRef }}
    {{- $env = append $env (dict "name" "MONGODB_CONNECTION_STRING" "valueFrom" (dict "secretKeyRef" (dict "name" .Values.global.coreServices.databases.mongodb.connectionStringSecretRef.name "key" .Values.global.coreServices.databases.mongodb.connectionStringSecretRef.key))) }}
  {{- else }}
    {{- fail "Either coreServices.databases.mongodb.connectionString or coreServices.databases.mongodb.connectionStringSecretRef must be set when coreServices.mode is MultiService" }}
  {{- end }}

  {{- if .Values.global.coreServices.databases.mongodb.databaseName }}
    {{- $env = append $env (dict "name" "MONGODB_DATABASE_NAME" "value" (.Values.coreServices.retriever.databases.mongodb.databaseName | default .Values.global.coreServices.databases.mongodb.databaseName)) }}
  {{- end }}

  {{- $emb := .Values.global.coreServices.search.embeddingService -}}
  {{- $urlSec := (default (dict) $emb.urlSecretRef) -}}
  {{- $apiSec := (default (dict) $emb.apiKeySecretRef) -}}
  {{- $hasUrlSec := and (hasKey $urlSec "name") (hasKey $urlSec "key") $urlSec.name $urlSec.key -}}
  {{- $hasUrlLit := and (hasKey $emb "url") $emb.url -}}
  {{- if $hasUrlSec }}
    {{- $env = append $env (dict "name" "EMBEDDING_SERVICE_URL" "valueFrom" (dict "secretKeyRef" (dict "name" $urlSec.name "key" $urlSec.key))) }}
  {{- else if $hasUrlLit }}
    {{- $env = append $env (dict "name" "EMBEDDING_SERVICE_URL" "value" $emb.url) }}
  {{- end }}
  {{- $hasApiKeySec := and (hasKey $apiSec "name") (hasKey $apiSec "key") $apiSec.name $apiSec.key -}}
  {{- $hasApiKeyLit := and (hasKey $emb "apiKey") $emb.apiKey -}}
  {{- if $hasApiKeySec }}
    {{- $env = append $env (dict "name" "EMBEDDING_SERVICE_API_KEY" "valueFrom" (dict "secretKeyRef" (dict "name" $apiSec.name "key" $apiSec.key))) }}
  {{- else if $hasApiKeyLit }}
    {{- $env = append $env (dict "name" "EMBEDDING_SERVICE_API_KEY" "value" $emb.apiKey) }}
  {{- end }}
  {{- if $emb.requestTemplate}}
    {{- $env = append $env (dict "name" "EMBEDDING_SERVICE_REQUEST_TEMPLATE" "value" $emb.requestTemplate) }}
  {{- end }}
  {{- if $emb.contentJsonPath }}
    {{- $env = append $env (dict "name" "EMBEDDING_SERVICE_CONTENT_JSON_PATH" "value" $emb.contentJsonPath) }}
  {{- end }}
  {{- if $emb.resultJsonPath }}
    {{- $env = append $env (dict "name" "EMBEDDING_SERVICE_RESULT_JSON_PATH" "value" $emb.resultJsonPath) }}
  {{- end }}

  {{- /* Search database configuration (optional): prefer literal, else secretRef */ -}}
  {{- $searchDb := .Values.global.coreServices.search.database -}}
  {{- $hasSearchConn := false -}}
  {{- if and (hasKey $searchDb "connectionString") $searchDb.connectionString }}
    {{- $env = append $env (dict "name" "SEARCH_DB_CONNECTION_STRING" "value" $searchDb.connectionString) }}
    {{- $hasSearchConn = true -}}
  {{- else if and (hasKey $searchDb "connectionStringSecretRef") (hasKey $searchDb.connectionStringSecretRef "name") (hasKey $searchDb.connectionStringSecretRef "key") }}
    {{- $env = append $env (dict "name" "SEARCH_DB_CONNECTION_STRING" "valueFrom" (dict "secretKeyRef" (dict "name" $searchDb.connectionStringSecretRef.name "key" $searchDb.connectionStringSecretRef.key))) }}
    {{- $hasSearchConn = true -}}
  {{- end }}
  {{- if and $hasSearchConn (hasKey $searchDb "databaseName") $searchDb.databaseName }}
    {{- $env = append $env (dict "name" "SEARCH_DB_DATABASE_NAME" "value" $searchDb.databaseName) }}
  {{- end }}

  {{ include "wds-helm-chart.deployment" (dict
    "ctx" .
    "name" $name
    "labels" (merge (default (dict) .Values.coreServices.retriever.deploymentExtraLabelsOverride) (default (dict) .Values.global.deploymentExtraLabels))
    "replicas" (.Values.coreServices.retriever.replicaCount | default 2)
    "nodeSelector" (.Values.coreServices.retriever.nodeSelectorOverride | default .Values.global.nodeSelector)
    "tolerations" (.Values.coreServices.retriever.tolerationsOverride | default .Values.global.tolerations)
    "affinity" (.Values.coreServices.retriever.affinityOverride | default .Values.global.affinity)
    "containers" (list
      (dict
        "name" $name
        "registry" .Values.global.registry
        "image" (.Values.coreServices.retriever.image.name | default "webdatasource/retriever")
        "tag" (.Values.coreServices.retriever.image.tag | default .Chart.AppVersion)
        "imagePullPolicy" (.Values.coreServices.retriever.image.pullPolicy | default "IfNotPresent")
        "ports" (list (dict "name" "grpc-web" "containerPort" 8082))
        "env" $env
      )
    )
  ) }}
{{- end }}
