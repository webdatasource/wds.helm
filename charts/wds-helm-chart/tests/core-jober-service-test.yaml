suite: test core jober service
templates:
  - core-jober-service.yaml

tests:
  - it: should not render outside MultiService mode
    set:
      global.coreServices.mode: SingleService
    asserts:
      - hasDocuments:
          count: 0

  - it: should render in MultiService mode
    set:
      global.coreServices.mode: MultiService
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: jober
      - equal:
          path: metadata.labels.app
          value: jober
      - equal:
          path: spec.selector.app
          value: jober
      - equal:
          path: spec.ports[0]
          value:
            name: grpc-web
            port: 8082
            targetPort: grpc-web
            protocol: TCP
      - equal:
          path: spec.ports[1]
          value:
            name: health
            port: 8080
            targetPort: health
            protocol: TCP

  - it: should merge global and service labels with service precedence
    set:
      global.coreServices.mode: MultiService
      global.serviceExtraLabels:
        globalLabel: global
        common: global
      coreServices.jober.serviceExtraLabelsOverride:
        serviceLabel: service
        common: service
    asserts:
      - equal:
          path: metadata.labels.globalLabel
          value: global
      - equal:
          path: metadata.labels.serviceLabel
          value: service
      - equal:
          path: metadata.labels.common
          value: service

  - it: should include shared labels and selectors
    set:
      global.coreServices.mode: MultiService
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: wds-helm-chart
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: RELEASE-NAME
      - equal:
          path: spec.selector["app.kubernetes.io/name"]
          value: wds-helm-chart
      - equal:
          path: spec.selector["app.kubernetes.io/instance"]
          value: RELEASE-NAME
